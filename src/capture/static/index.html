<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chess PGN Capture</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">

        <header>
            <div class="header-content">
                <h1>♟ Chess Capture</h1>
                <div class="status-badge" id="app-status">SETUP</div>
            </div>
        </header>

        <!-- ── Step 0: Game Setup ──────────────────────────────────────────── -->
        <div id="setup-panel" class="setup-panel">
            <h2>New Game</h2>
            <div class="setup-grid setup-grid--players">
                <div class="form-group">
                    <label for="inp-white">White Player</label>
                    <input type="text" id="inp-white" placeholder="White" autocomplete="off" value="test1" />
                </div>
                <div class="form-group">
                    <label for="inp-black">Black Player</label>
                    <input type="text" id="inp-black" placeholder="Black" autocomplete="off" value="test2" />
                </div>
            </div>
            <!-- hidden fields kept for server compatibility -->
            <input type="hidden" id="inp-event" />
            <input type="hidden" id="inp-site" />
            <input type="hidden" id="inp-date" />
            <input type="hidden" id="inp-round" value="-" />
            <input type="hidden" id="inp-tc" value="Casual" />
            <input type="hidden" id="inp-notes" />
            <input type="hidden" id="inp-save-raw" value="false" />
            <div class="setup-actions" style="margin-top:1.4rem;">
                <button id="btn-start-session" class="btn primary large full-width">Start Session →</button>
            </div>
        </div>

        <!-- ── Steps 1–3 + active game ────────────────────────────────────── -->
        <main id="game-panel" style="display:none;">

            <!-- Camera / board view -->
            <div class="video-wrapper">
                <div class="video-container">

                    <!-- Step 1: Crop-box calibration -->
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay-canvas"></canvas>
                    <div class="cam-bar" id="calibration-controls">
                        <span class="cam-hint">Drag corners to frame the board</span>
                        <button id="btn-calibrate" class="btn primary">Calibrate</button>
                        <button id="btn-reset-box" class="btn secondary">Reset Box</button>
                    </div>

                    <!-- Step 3: a1 orientation (4-button picker) -->
                    <div id="orientation-panel" style="display:none; position:absolute; inset:0; background:#000; flex-direction:column; z-index:25;">
                        <div style="flex:1; position:relative; overflow:hidden;">
                            <img id="warped-board-img" style="width:100%; height:100%; object-fit:contain;" />
                            <canvas id="orientation-canvas" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none;"></canvas>
                        </div>
                        <div class="cam-bar" id="orientation-controls" style="flex-direction:column; gap:0.5rem;">
                            <span class="cam-hint" id="orientation-hint">Where is <strong>a1</strong>? (White's queen-side rook)</span>
                            <div class="orient-buttons">
                                <button class="btn orient-btn" data-col="0" data-row="7">Bottom-Left</button>
                                <button class="btn orient-btn" data-col="7" data-row="7">Bottom-Right</button>
                                <button class="btn orient-btn" data-col="0" data-row="0">Top-Left</button>
                                <button class="btn orient-btn" data-col="7" data-row="0">Top-Right</button>
                            </div>
                            <div style="display:flex; gap:0.5rem; width:100%;">
                                <button id="btn-confirm-a1" class="btn primary" style="flex:1;" disabled>Confirm</button>
                                <button id="btn-redo-corners" class="btn secondary">Redo Grid</button>
                            </div>
                        </div>
                    </div>

                    <!-- Step 2: Grid correction -->
                    <div id="grid-correction-panel" style="display:none; position:absolute; inset:0; background:#000; flex-direction:column; z-index:25;">
                        <div style="flex:1; position:relative; overflow:hidden;">
                            <img id="grid-board-img" style="width:100%; height:100%; object-fit:contain;" />
                            <canvas id="grid-canvas" style="position:absolute; inset:0; width:100%; height:100%; touch-action:none;"></canvas>
                        </div>
                        <div class="cam-bar" style="flex-direction:column; gap:0.5rem;">
                            <span class="cam-hint" id="grid-hint">Drag grid lines to align with board squares, then confirm</span>
                            <div style="display:flex; gap:0.5rem; width:100%;">
                                <button id="btn-confirm-grid" class="btn primary" style="flex:1;">Confirm Grid</button>
                                <button id="btn-redo-orientation" class="btn secondary">Redo Corners</button>
                            </div>
                        </div>
                    </div>

                </div><!-- /video-container -->
            </div><!-- /video-wrapper -->

            <!-- Sidebar / info panels -->
            <div class="sidebar">

                <div class="panel">
                    <h2>Game Info</h2>
                    <div class="info-row"><span class="label">White</span><span class="value" id="info-white">—</span></div>
                    <div class="info-row"><span class="label">Black</span><span class="value" id="info-black">—</span></div>
                    <div class="info-row"><span class="label">Event</span><span class="value small" id="info-event">—</span></div>
                    <div class="info-row"><span class="label">Date</span><span class="value" id="info-date">—</span></div>
                    <div class="info-row"><span class="label">Time</span><span class="value" id="info-tc">—</span></div>
                </div>

                <div class="panel">
                    <h2>Session</h2>
                    <div class="info-row"><span class="label">Game ID</span><span class="value small" id="info-game-id">—</span></div>
                    <div class="info-row"><span class="label">Moves</span><span class="value" id="info-moves">0</span></div>
                    <div class="info-row"><span class="label">Orientation</span><span class="value" id="info-rotation">—</span></div>
                </div>

                <div class="panel" id="end-game-panel" style="display:none;">
                    <h2>End Game</h2>
                    <div class="result-buttons">
                        <button class="btn result-btn" data-result="1-0">1-0 White wins</button>
                        <button class="btn result-btn" data-result="0-1">0-1 Black wins</button>
                        <button class="btn result-btn" data-result="1/2-1/2">½-½ Draw</button>
                        <button class="btn result-btn secondary" data-result="*">Ongoing</button>
                    </div>
                    <div id="result-display" class="result-display" style="display:none;"></div>
                </div>

                <div class="panel">
                    <button id="btn-reset" class="btn danger full-width">Reset Session</button>
                </div>

                <div class="panel">
                    <h2>Motion Debug</h2>
                    <div class="mask-container">
                        <img id="debug-mask" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="debug">
                    </div>
                </div>

            </div><!-- /sidebar -->
        </main>

        <!-- ── PGN Screen (shown after result is recorded) ─────────────── -->
        <div id="pgn-screen" class="pgn-screen" style="display:none;">
            <div class="pgn-card">
                <h2>Game Saved</h2>
                <div class="pgn-meta" id="pgn-meta"></div>
                <textarea id="pgn-text" readonly></textarea>
                <div class="pgn-actions">
                    <button id="btn-copy-pgn"     class="btn primary">Copy PGN</button>
                    <button id="btn-download-pgn" class="btn secondary">Download .pgn</button>
                </div>
                <div class="pgn-divider"></div>
                <div class="pgn-next">
                    <button id="btn-new-same-cal" class="btn primary full-width">New Game (Same Calibration)</button>
                    <button id="btn-new-fresh-cal" class="btn secondary full-width">New Game (New Calibration)</button>
                </div>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
